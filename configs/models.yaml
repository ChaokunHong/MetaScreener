# ─── Recommended Presets ─────────────────────────────────────────
presets:
  balanced:
    name: "Balanced (Recommended)"
    description: "4 models across 4 vendors, mix of fast and thinking. Best for most reviews (~$0.005/paper)"
    models: ["deepseek-v3", "qwen3", "kimi-k2", "llama4-maverick"]

  precision:
    name: "Maximum Precision"
    description: "2 thinking + 2 large non-thinking models. Highest accuracy for complex eligibility decisions (~$0.009/paper)"
    models: ["deepseek-v3", "qwen3", "kimi-k2.5", "nous-hermes4"]

  budget:
    name: "Budget Friendly"
    description: "1 tier-1 anchor + 3 fast non-thinking models. Lower quality but 5x cheaper (~$0.003/paper)"
    models: ["deepseek-v3", "llama4-maverick", "gemma3-27b", "mistral-small4"]

  comprehensive:
    name: "Comprehensive (8 models)"
    description: "8 models (4 thinking + 4 fast) for maximum consensus strength. Best for critical reviews (~$0.019/paper)"
    models: ["deepseek-v3", "qwen3", "kimi-k2.5", "llama4-maverick", "glm5-turbo", "nous-hermes4", "nvidia-nemotron", "minimax-m2.7"]

# ─── Thresholds ──────────────────────────────────────────────────
thresholds:
  tau_high: 0.50
  tau_mid: 0.10
  tau_low: 0.05
  dissent_tolerance: 0.15   # Tier 1 allows floor(n*0.15) dissenters: n≤6 unanimous, n=7-13 one, n=14+ two
  target_sensitivity: 0.98

# ─── Inference ───────────────────────────────────────────────────
inference:
  temperature: 0.0
  timeout_s: 45.0
  timeout_thinking_s: 120.0             # Thinking models need more time (Kimi ~10-60s)
  max_retries: 3                       # Increased from 2 — handle intermittent failures
  max_tokens_standard: 4096
  max_tokens_thinking: 4096            # Reduced from 8192 — screening JSON is small
  # OpenRouter reasoning effort for thinking models (none/low/medium/high):
  reasoning_effort_criteria: "none"    # Criteria generation: JSON output, no CoT needed
  reasoning_effort_screening: "low"    # Screening: light CoT, avoids token starvation

# ─── Criteria Pipeline ───────────────────────────────────────────
criteria:
  dedup_quorum_fraction: 0.5
  enable_terminology_enhancement: true
  enable_auto_refine: true

# ─── Element Consensus ──────────────────────────────────────────
element_weights:
  # Default weights for ECS computation, reflecting clinical importance.
  # Configurable per-framework; these are the PICO defaults.
  default:
    population: 1.0
    intervention: 1.0
    comparison: 0.6
    outcome: 0.8
    study_design: 0.7
  # Framework-specific overrides
  pico:
    population: 1.0
    intervention: 1.0
    comparison: 0.6
    outcome: 0.8
    study_design: 0.7
  peo:
    population: 1.0
    exposure: 1.0
    outcome: 0.9
    study_design: 0.7
  spider:
    sample: 1.0
    phenomenon: 1.0
    design: 0.8
    evaluation: 0.8
    research_type: 0.6

# ─── OCR Backends ───────────────────────────────────────────
ocr:
  # VLM model for rich document OCR (tables, equations, scanned pages).
  # Uses litellm → OpenRouter. Format: "openrouter/<provider>/<model>"
  vlm_model: "openrouter/qwen/qwen2.5-vl-72b-instruct"
  vlm_fallback: "openrouter/qwen/qwen2.5-vl-7b-instruct"
  # Enable/disable optional backends (graceful fallback when not installed)
  enable_tesseract: true
  enable_marker: true
  enable_mineru: true

# ─── Calibration ────────────────────────────────────────────────
calibration:
  camd_alpha: 0.5              # CAMD minority penalty sensitivity [0.0-1.0]
  confidence_blend_alpha: 0.7  # Hybrid confidence: weight for decision entropy vs score coherence
  ecs_threshold: 0.60          # Minimum ECS for auto-decisions at Tier 2
  heterogeneity_high: 0.60     # Chunk heterogeneity threshold for HUMAN_REVIEW
  heterogeneity_moderate: 0.30 # Chunk heterogeneity moderate warning threshold
  prior_tier_weights:          # Bayesian prior weights by model tier (cold start)
    1: 1.00                    # Tier 1 (flagship): full weight
    2: 0.75                    # Tier 2 (strong): 75%
    3: 0.50                    # Tier 3 (fallback): 50%
