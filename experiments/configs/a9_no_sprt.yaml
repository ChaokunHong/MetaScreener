# A9 variant: SPRT disabled — all records use all 4 models
aggregation:
  method: "glad"
ecs:
  method: "geometric"
sprt:
  enabled: false
rcps:
  enabled: true
ipw:
  audit_rate: 0.05
esas:
  enabled: true
parse_quality:
  enabled: true
router:
  method: "bayesian"
  phase2_gates_enabled: false  # legacy sensitivity: no exclude-certainty
backends:
  - "deepseek-v3"
  - "qwen3"
  - "kimi-k2"
  - "llama4-maverick"
