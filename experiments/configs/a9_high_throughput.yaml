# A9 variant: high_throughput loss preset (c_fn=20, c_fp=1, c_hr=3)
aggregation:
  method: "glad"
ecs:
  method: "geometric"
sprt:
  enabled: true
rcps:
  enabled: true
ipw:
  audit_rate: 0.05
esas:
  enabled: true
parse_quality:
  enabled: true
router:
  method: "bayesian"
  phase2_gates_enabled: false  # legacy sensitivity: no exclude-certainty
decision:
  loss_preset: "high_throughput"
backends:
  - "deepseek-v3"
  - "qwen3"
  - "kimi-k2"
  - "llama4-maverick"
