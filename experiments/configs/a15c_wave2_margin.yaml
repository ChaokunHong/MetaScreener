# A15c: A13b + narrower margin for SPRT wave2 records
# Wave1 (SPRT early-stop, ~93% of records, 2 models) keeps margin=0.10.
# Wave2 (~7%, all 4 models consulted): margin=0.03. Rationale: once we've
# paid to question all models, Chow-margin abstention in the indifference
# region no longer buys new information — the decision either commits
# or genuinely needs a human.
aggregation:
  method: "glad"
ecs:
  method: "geometric"
sprt:
  enabled: true
rcps:
  enabled: true
ipw:
  audit_rate: 0.05
esas:
  enabled: true
parse_quality:
  enabled: true
router:
  method: "bayesian"
  wave2_uncertainty_margin: 0.03
  exclude_certainty_enabled: true
  exclude_certainty_mode: "coverage"
  exclude_certainty_coverage_early_threshold: 0.60
  exclude_certainty_coverage_full_threshold: 0.50
  exclude_certainty_contradiction_weight_threshold: 0.8
  exclude_certainty_min_replicated_high_weight: 1
  exclude_certainty_full_threshold: 0.75
  exclude_certainty_early_threshold: 0.95
  exclude_certainty_full_min_supporting: 1
  exclude_certainty_early_min_supporting: 2
  exclude_certainty_support_ratio: 0.75
backends:
  - "deepseek-v3"
  - "qwen3"
  - "kimi-k2"
  - "llama4-maverick"
