# Solo model: llama4-maverick — all pipeline features off, single-model baseline
aggregation:
  method: "weighted_average"
ecs:
  method: "arithmetic"
sprt:
  enabled: false
rcps:
  enabled: false
ipw:
  audit_rate: 0.0
esas:
  enabled: false
parse_quality:
  enabled: false
router:
  method: "threshold"
calibration:
  ecs_threshold: 0.0
backends:
  - "llama4-maverick"
