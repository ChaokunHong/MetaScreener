# Ablation A0: Single-model baseline (deepseek-v3 only, all features off)
aggregation:
  method: "weighted_average"
ecs:
  method: "arithmetic"
sprt:
  enabled: false
rcps:
  enabled: false
ipw:
  audit_rate: 0.0
esas:
  enabled: false
parse_quality:
  enabled: false
router:
  method: "threshold"
# Single-model baseline: ECS gate disabled because Element Consensus
# requires ≥2 models to produce meaningful scores (_MIN_DECIDED_VOTES=2).
# With 1 model, EAS is always 0.5 < default threshold 0.60, which would
# gate every EXCLUDE to HUMAN_REVIEW and degenerate the baseline.
calibration:
  ecs_threshold: 0.0
backends:
  - "deepseek-v3"
