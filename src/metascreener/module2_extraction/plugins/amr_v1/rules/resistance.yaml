rules:
  - rule_id: "AMR_R001"
    name: "resistant_leq_tested"
    description: "Number of resistant isolates cannot exceed tested count"
    severity: "error"
    field_a: "N_Resistant"
    field_b: "N_Tested"
    condition: "leq"
    message: "N_Resistant ({a}) exceeds N_Tested ({b})"
  - rule_id: "AMR_R002"
    name: "tested_not_empty"
    description: "N_Tested should not be empty for resistance data"
    severity: "warning"
    field_a: "N_Tested"
    condition: "not_empty"
    message: "N_Tested is empty — cannot calculate prevalence"
  - rule_id: "AMR_R003"
    name: "intermediate_leq_tested"
    description: "Intermediate count cannot exceed tested count"
    severity: "error"
    field_a: "N_Intermediate"
    field_b: "N_Tested"
    condition: "leq"
    message: "N_Intermediate ({a}) exceeds N_Tested ({b})"
